version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./.tmp:/.tmp
    env_file:
      - .env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: frontend
      args:
        - VITE_API_URL=http://195.35.40.211:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
